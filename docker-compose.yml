version: "3.9"

services:
  zca-js-echo:
    build: .
    image: zca-js-echo-server:latest
    container_name: zca-js-echo
    restart: always
    ports:
      - "9898:9898"
    environment:
      NODE_ENV: production
      PORT: 9898
      ECHO_PREFIX: "echo: "
      ONLY_REPLY_PREFIX: ""
    volumes:
      - ./qr.png:/app/qr.png